app:
  fullnameOverride: random-quiz

  image:
    # repository: 082867736673.dkr.ecr.ap-northeast-2.amazonaws.com/nalbam/random-quiz
    repository: nalbam/random-quiz

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 128Mi

  service:
    name: http
    targetPort: 8000

  readinessProbe:
    failureThreshold: 3
    httpGet:
      path: /healthz
      port: 8000
    initialDelaySeconds: 1
    periodSeconds: 3

  livenessProbe:
    failureThreshold: 3
    httpGet:
      path: /healthz
      port: 8000
    initialDelaySeconds: 1
    periodSeconds: 3

  routing:
    httpRoute:
      parentRefs:
        - name: istio-ingressgateway
          namespace: istio-system

  pdb:
    enabled: true
    maxUnavailable: 1

  serviceAccount:
    create: true
