app:
  fullnameOverride: sample-spring

  image:
    # repository: 082867736673.dkr.ecr.ap-northeast-2.amazonaws.com/nalbam/sample-spring
    repository: nalbam/sample-spring

  # controller:
  #   kind: Rollout
  #   strategy:
  #     type: BlueGreen
  #     # rollingUpdate:
  #     #   maxSurge: 25%
  #     #   maxUnavailable: 0
  #     blueGreen:
  #       autoPromotionEnabled: true
  #       autoPromotionSeconds: 30

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  readinessProbe:
    failureThreshold: 3
    httpGet:
      path: /read
      port: 8080
    initialDelaySeconds: 20
    periodSeconds: 10

  livenessProbe:
    failureThreshold: 3
    httpGet:
      path: /live
      port: 8080
    initialDelaySeconds: 20
    periodSeconds: 10

  service:
    name: http
    targetPort: 8080

  routing:
    httpRoute:
      parentRefs:
        - name: istio-ingressgateway
          namespace: istio-system

  pdb:
    enabled: true
    maxUnavailable: 1
