app:
  configmap:
    enabled: true
    data:
      STAGE: 'prod'
      AWS_REGION: ap-northeast-2
      DYNAMODB_TABLE_NAME: agent-studio
      BETTER_AUTH_URL: https://agent-studio.{{hostname.public}}
      PUBLIC_BASE_URL: https://agent-studio.{{hostname.public}}
      LLM_BASE_URL: https://api.openai.com/v1
      LLM_PROVIDER_OPENAI_BASE_URL: https://api.openai.com/v1
      ALLOWED_EMAIL_DOMAINS: nalbam.com
      SLACK_DEFAULT_PROJECT: sample-assistant
      SKILLS_REPO: opspresso/agent-skills
      SKILLS_REPO_BRANCH: main
  routing:
    hosts:
    - agent-studio.{{hostname.public}}
    httpRoute:
      enabled: true
  podLabels:
    sidecar.istio.io/inject: "true"
  podAnnotations:
    link.argocd.argoproj.io/external-link: https://agent-studio.{{hostname.public}}
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::396608815058:role/irsa--{{cluster}}--agent-studio
